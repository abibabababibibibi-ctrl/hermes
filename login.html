<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Гермес Агентство недвижимости</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo">ГЕРМЕС</div>
                    <div class="subtitle">Агентство недвижимости</div>
                </div>
                
                <div class="auth-body">
                    <form class="auth-form" id="loginForm">
                        <div class="form-group">
                            <label>Email или телефон <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="text" id="loginEmail" placeholder="ivan@example.com или +7 (999) 123-45-67" required>
                            </div>
                            <div class="error-message" id="emailError"></div>
                        </div>

                        <div class="form-group">
                            <label>Пароль <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                                <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword')"></i>
                            </div>
                            <div class="error-message" id="passwordError"></div>
                        </div>

                        <div class="form-group">
                            <label class="checkbox-group">
                                <input type="checkbox" id="rememberMe">
                                <span>Запомнить меня</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-auth" id="loginBtn">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </button>

                        <div class="auth-divider">
                            <span>или</span>
                        </div>

                        <button type="button" class="btn-google" onclick="alert('Вход через Google будет доступен позже')">
                            <i class="fab fa-google"></i> Войти через Google
                        </button>

                        <div class="auth-footer">
                            Нет аккаунта? <a href="register.html">Зарегистрироваться</a><br>
                            <a href="#" onclick="alert('Инструкция по восстановлению отправлена на email')">Забыли пароль?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const login = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Очистка ошибок
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('.input-wrapper input').forEach(el => {
                el.classList.remove('error');
            });
            
            if (!login) {
                const errorDiv = document.getElementById('emailError');
                errorDiv.textContent = 'Введите email или телефон';
                errorDiv.classList.add('show');
                document.getElementById('loginEmail').classList.add('error');
                return;
            }
            
            if (!password) {
                const errorDiv = document.getElementById('passwordError');
                errorDiv.textContent = 'Введите пароль';
                errorDiv.classList.add('show');
                document.getElementById('loginPassword').classList.add('error');
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Вход...';
            
            // Имитация запроса к серверу
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('hermes_users') || '[]');
                const user = users.find(u => u.email === login || u.phone === login);
                
                if (!user) {
                    showNotification('Пользователь не найден', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
                    return;
                }
                
                if (btoa(password) !== user.password) {
                    showNotification('Неверный пароль', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
                    return;
                }
                
                if (user.status === 'blocked') {
                    showNotification('Аккаунт заблокирован', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
                    return;
                }
                
                // Сохранение сессии
                const sessionUser = { ...user };
                delete sessionUser.password;
                
                if (rememberMe) {
                    localStorage.setItem('hermes_session', JSON.stringify(sessionUser));
                    localStorage.setItem('hermes_remember', 'true');
                } else {
                    sessionStorage.setItem('hermes_current_user', JSON.stringify(sessionUser));
                }
                
                localStorage.setItem('currentUser', JSON.stringify(sessionUser));
                
                showNotification('Добро пожаловать!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                
            }, 800);
        });

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `auth-notification ${type}`;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
    </script>
</body>
</html>
