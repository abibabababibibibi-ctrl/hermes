<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - Гермес Агентство недвижимости</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .users-page {
            background: var(--bg-secondary);
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 60px;
        }
        .users-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-primary); border-radius: 15px; padding: 1.5rem; text-align: center; border: 1px solid var(--border-color); }
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--secondary-color); }
        .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
        .filters-bar { background: var(--bg-primary); border-radius: 15px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid var(--border-color); }
        .filters-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .filter-group label { font-weight: 500; font-size: 0.9rem; }
        .filter-group input, .filter-group select { padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); color: var(--text-primary); }
        .users-table-container { background: var(--bg-primary); border-radius: 15px; border: 1px solid var(--border-color); overflow-x: auto; }
        .users-table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .users-table th { background: var(--bg-secondary); font-weight: 600; cursor: pointer; }
        .users-table tr:hover { background: var(--bg-secondary); }
        .user-avatar-small { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .role-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
        .role-admin { background: #e74c3c; color: white; }
        .role-agent { background: #3498db; color: white; }
        .role-user { background: #95a5a6; color: white; }
        .status-active { color: #27ae60; }
        .status-blocked { color: #e74c3c; }
        .action-buttons { display: flex; gap: 0.5rem; }
        .icon-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: all 0.3s; }
        .icon-btn.view { background: #3498db; color: white; }
        .icon-btn.edit { background: #f39c12; color: white; }
        .icon-btn.block { background: #e74c3c; color: white; }
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }
        .page-btn { padding: 0.5rem 1rem; border: 1px solid var(--border-color); background: var(--bg-primary); border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: var(--secondary-color); color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-primary); border-radius: 20px; max-width: 500px; width: 100%; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border-color); display: flex; gap: 1rem; justify-content: flex-end; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); color: var(--text-primary); }
        @media (max-width: 768px) { .filters-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">...</header>
    <div class="users-page">
        <div class="users-container">
            <div class="page-header">
                <h1><i class="fas fa-users-cog"></i> Управление пользователями</h1>
                <button class="btn btn-primary" onclick="openUserModal()"><i class="fas fa-plus"></i> Добавить пользователя</button>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="filters-bar">
                <div class="filters-row">
                    <div class="filter-group"><label>Поиск</label><input type="text" id="searchUser" placeholder="Имя, email, телефон..."></div>
                    <div class="filter-group"><label>Роль</label><select id="filterRole"><option value="">Все</option><option value="admin">Администратор</option><option value="agent">Агент</option><option value="user">Пользователь</option></select></div>
                    <div class="filter-group"><label>Отдел</label><select id="filterDepartment"><option value="">Все</option><option value="sales">Отдел продаж</option><option value="rental">Отдел аренды</option><option value="admin">Администрация</option></select></div>
                    <div class="filter-group"><label>Статус</label><select id="filterStatus"><option value="">Все</option><option value="active">Активен</option><option value="blocked">Заблокирован</option></select></div>
                </div>
            </div>
            <div class="users-table-container">
                <table class="users-table">
                    <thead><tr><th onclick="sortTable('name')">Пользователь</th><th onclick="sortTable('email')">Email</th><th>Телефон</th><th onclick="sortTable('role')">Роль</th><th>Отдел</th><th>Статус</th><th>Действия</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    <div class="modal" id="userModal"><div class="modal-content"><div class="modal-header"><h3 id="userModalTitle">Добавление пользователя</h3><button class="close-modal" onclick="closeUserModal()">&times;</button></div><div class="modal-body"><form id="userForm"><input type="hidden" id="userId"><div class="form-group"><label>Имя</label><input type="text" id="userFirstName" required></div><div class="form-group"><label>Фамилия</label><input type="text" id="userLastName" required></div><div class="form-group"><label>Email</label><input type="email" id="userEmail" required></div><div class="form-group"><label>Телефон</label><input type="tel" id="userPhone"></div><div class="form-group"><label>Роль</label><select id="userRole"><option value="user">Пользователь</option><option value="agent">Агент</option><option value="admin">Администратор</option></select></div><div class="form-group"><label>Отдел</label><select id="userDepartment"><option value="sales">Отдел продаж</option><option value="rental">Отдел аренды</option><option value="admin">Администрация</option></select></div><div class="form-group"><label>Пароль</label><input type="password" id="userPassword" placeholder="Оставьте пустым для генерации"></div></form></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeUserModal()">Отмена</button><button class="btn btn-primary" onclick="saveUser()">Сохранить</button></div></div></div>
    <script src="js/theme.js"></script><script src="js/auth.js"></script><script src="js/database.js"></script><script src="js/user-manager.js"></script>
</body>
</html>
